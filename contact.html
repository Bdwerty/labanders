<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="https://www.flaticon.com/search?word=c">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Masterial+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css">
    <link rel="stylesheet" href="https://fontawesome.com/search?q=wash&o=r">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="Script.Js">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+P+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Contact Us</title> 
    <link rel="icon" href="images/logo_-removebg-preview.png">
</head>

<body>
    <header>
        <nav>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn">
                <i class="ri-menu-line"></i>
            </label>
            <label class="logotxt">
                <h1>Labanders</h1>
                <img src="images/logo_-removebg-preview.png" alt="" class="logoimage"> 
            </label>
            <ul>
                <li><a href="index.html" class="active">Home</a></li>  
                <li><a href="about.html" class="active">About Us</a></li>
                <li><a href="service.html" class="active">Services</a></li>
                <li><a href="location.html" class="active">Location</a></li>  
            </ul>
        </nav>
    </header>

    <div class="contact-container">
        <div class="contact-box">
            <div class="left"></div>
            <div class="right">
                <h1>You can reach us!</h1>
                <p>We are here for you! How can we help you?</p>
                <input type="text" id="name" class="field" placeholder="Name">
                <input type="email" id="email" class="field" placeholder="Email">
                <textarea id="message" class="field area" placeholder="Message"></textarea>
                <button id="contact-btn" class="contact-btn">Send</button>
                <p id="error-message" style="color: red; display: none;"></p>
                <p id="success-message" style="color: green; display: none;">Your message has been sent successfully!</p>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("QxRmVs_SZb-Exc8ZP"); 
       })();
    </script>
    <script src="Script.Js"></script>
</body>
</html>
